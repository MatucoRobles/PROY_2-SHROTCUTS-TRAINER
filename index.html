<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>proy-2-shrotcuts-trainer</title>
  </head>
  <body>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('shortcuts-trainer-theme-storage');
          var mode = 'dark';
          if (raw) {
            try { mode = JSON.parse(raw).state.mode || 'dark'; } catch (e) {}
          }
          if (mode === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
