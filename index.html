  </head>
  <body>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('shortcuts-trainer-theme-storage');
          var mode = 'dark';
          if (raw) {
            try { mode = JSON.parse(raw).state.mode || 'dark'; } catch (e) {}
          }
          if (mode === 'light') document.documentElement.classList.add('light');
        } catch (e) {}
        try {
          var langRaw = localStorage.getItem('shortcuts-trainer-language-storage');
          if (langRaw) {
            var lang = JSON.parse(langRaw).state.language;
            if (lang) document.documentElement.lang = lang;
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
